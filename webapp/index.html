<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이중언어 학습 시스템</title>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <link rel="stylesheet" href="/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="home-page tab-shell" data-nav="home">
  <div class="app">
    <main class="home-main">
      <div class="home-focus">
        <section class="home-hero">
          <h2 class="home-greeting">
            <span class="home-greeting__line home-greeting__line--dark">안녕하세요,</span>
            <span class="home-greeting__line home-greeting__line--accent">무엇을 도와드릴까요?</span>
          </h2>
        </section>

        <div class="home-orb-wrap" aria-hidden="true">
          <img class="home-ai" src="/images/ai.png" alt="" />
        </div>

        <div class="home-action-cards">
          <button type="button" class="action-card" id="newChatBtn">
            <div class="action-card__text">
              <div class="action-card__head">
                <span class="action-card__icon-slot" aria-hidden="true">
                  <i data-lucide="messages-square" class="action-card__icon action-card__icon--accent"></i>
                </span>
                <span class="action-card__label">대화 시작</span>
              </div>
              <span class="action-card__desc">새로운 대화를 시작해요</span>
            </div>
          </button>
          <a href="wordbook.html" class="action-card action-card--link">
            <div class="action-card__text">
              <div class="action-card__head">
                <span class="action-card__icon-slot" aria-hidden="true">
                  <i data-lucide="book-open" class="action-card__icon action-card__icon--accent"></i>
                </span>
                <span class="action-card__label">단어장</span>
              </div>
              <span class="action-card__desc">저장한 단어를 확인해요</span>
            </div>
          </a>
        </div>
      </div>

      <section class="history-section" aria-labelledby="historyHeading">
        <div class="history-section__head">
          <h2 id="historyHeading">최근 대화</h2>
          <a href="history.html" class="history-view-all" id="viewAllLink">
            전체 보기
            <i data-lucide="chevron-right" class="history-view-all__chevron" aria-hidden="true"></i>
          </a>
        </div>
        <ul class="conversation-list" id="conversationList"></ul>
        <p class="empty-history" id="emptyHistory" hidden>아직 대화가 없어요. 새 대화를 시작해 보세요.</p>
      </section>
    </main>
  </div>

  <script src="/squircle-fallback.js"></script>
  <script src="/icon-gradient.js"></script>
  <script src="/bottom-nav.js"></script>
  <script src="/storage.js"></script>
  <script src="/conversations-ui.js"></script>
  <script src="/home.js"></script>
</body>
</html>
